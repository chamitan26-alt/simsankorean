<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌸 シムさんと学ぶ 韓国語オノマトペクイズ</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="quizApp">


  <!-- タイトル -->

  <h1>
    🌸 シムさんと学ぶ<br>
    韓国語オノマトペクイズ
  </h1>


  <!-- シムさん -->

  <img src="shimsan.png" id="simImage" class="character">


  <!-- ホーム画面 -->

  <div id="homeScreen">


    <p class="subtitle">

      韓国語をもっと身近に♪<br>
      クイズ形式で楽しく覚えよう！

    </p>


    <button id="startButton">

      クイズ開始

    </button>


  </div>




  <!-- クイズ画面 -->


  <div id="quiz" style="display:none;">


    <h2 id="question">

      問題読み込み中...

    </h2>



    <div id="choices"></div>



    <p id="score">

      現在の得点：0 / 10

    </p>



    <button id="nextButton">

      次へ

    </button>



    <button id="homeButton">

      ← 戻る

    </button>



  </div>



</div>



<script src="script.js"></script>


</body>

</html>
